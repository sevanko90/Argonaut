name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore workloads
        run: dotnet workload restore
      - name: Publish
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          dotnet publish Argonaut/Argonaut.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:InformationalVersion=${{ github.ref_name }}
      - name: Publish and package .app
        if: matrix.os == 'macos-latest'
        run: ./scripts/package-macos.sh ${{ matrix.rid }} ${{ github.ref_name }}
      - name: Collect binlog on failure
        if: failure()
        run: dotnet publish Argonaut/Argonaut.csproj -c Release -r ${{ matrix.rid }} /bl:publish-${{ matrix.rid }}.binlog
      - uses: actions/upload-artifact@v4
        if: matrix.os != 'macos-latest'
        with:
          name: argonaut-${{ matrix.rid }}
          path: Argonaut/bin/Release/net10.0/${{ matrix.rid }}/publish
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'macos-latest'
        with:
          name: argonaut-${{ matrix.rid }}
          path: dist/Argonaut.app
      - name: Zip publish output
        if: matrix.os != 'macos-latest' && github.event_name == 'release'
        shell: bash
        run: |
          cd Argonaut/bin/Release/net10.0/${{ matrix.rid }}/publish
          zip -r ${{ github.workspace }}/argonaut-${{ matrix.rid }}.zip .
      - name: Zip .app bundle
        if: matrix.os == 'macos-latest' && github.event_name == 'release'
        run: |
          cd dist
          zip -r -y ${{ github.workspace }}/argonaut-${{ matrix.rid }}.zip Argonaut.app
      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: argonaut-${{ matrix.rid }}.zip
      - name: Upload binlog
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: publish-logs-${{ matrix.rid }}
          path: publish-${{ matrix.rid }}.binlog
